syntax = "proto3";

package rewardchain.rewards.v1;

import "amino/amino.proto";
import "cosmos/base/v1beta1/coin.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "rewardchain/rewards/v1/params.proto";

option go_package = "rewardchain/x/rewards/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams (MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // CreatePartner defines the CreatePartner RPC.
  rpc CreatePartner (MsgCreatePartner) returns (MsgCreatePartnerResponse);

  // UpdatePartner defines the UpdatePartner RPC.
  rpc UpdatePartner (MsgUpdatePartner) returns (MsgUpdatePartnerResponse);

  // DeletePartner defines the DeletePartner RPC.
  rpc DeletePartner (MsgDeletePartner) returns (MsgDeletePartnerResponse);

  // IssueReward defines the IssueReward RPC.
  rpc IssueReward (MsgIssueReward) returns (MsgIssueRewardResponse);

  // BurnReward defines the BurnReward RPC.
  rpc BurnReward (MsgBurnReward) returns (MsgBurnRewardResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "rewardchain/x/rewards/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.
  // NOTE: All parameters must be supplied.
  Params params = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}

// MsgUpdateParamsResponse defines the response structure for executing a MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgCreatePartner defines the MsgCreatePartner message.
message MsgCreatePartner {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string index = 2;
  string name = 3;
  string website = 4;
  string description = 5;
  string wallet = 6;
  string status = 7;
}

// MsgCreatePartnerResponse defines the MsgCreatePartnerResponse message.
message MsgCreatePartnerResponse {}

// MsgUpdatePartner defines the MsgUpdatePartner message.
message MsgUpdatePartner {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string index = 2;
  string name = 3;
  string website = 4;
  string description = 5;
  string wallet = 6;
  string status = 7;
}

// MsgUpdatePartnerResponse defines the MsgUpdatePartnerResponse message.
message MsgUpdatePartnerResponse {}

// MsgDeletePartner defines the MsgDeletePartner message.
message MsgDeletePartner {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string index = 2;
}

// MsgDeletePartnerResponse defines the MsgDeletePartnerResponse message.
message MsgDeletePartnerResponse {}

// MsgIssueReward defines the MsgIssueReward message.
message MsgIssueReward {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string partner_index = 2;
  string recipient = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  repeated cosmos.base.v1beta1.Coin amount = 4 [(gogoproto.nullable) = false];
  string reason = 5;
}

// MsgIssueRewardResponse defines the MsgIssueRewardResponse message.
message MsgIssueRewardResponse {}

// MsgBurnReward defines the MsgBurnReward message.
message MsgBurnReward {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string partner_index = 2;
  string owner = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  repeated cosmos.base.v1beta1.Coin amount = 4 [(gogoproto.nullable) = false];
  string reason = 5;
}

// MsgBurnRewardResponse defines the MsgBurnRewardResponse message.
message MsgBurnRewardResponse {}
