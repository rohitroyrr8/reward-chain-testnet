syntax = "proto3";
package rewardchain.rewards.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "rewardchain/x/rewards/types";

// Params defines the parameters for the module.
message Params {
  option (amino.name) = "rewardchain/x/rewards/Params";
  option (gogoproto.equal) = true;

  string admin_address = 1;
  repeated string operator_addresses = 2;
}
